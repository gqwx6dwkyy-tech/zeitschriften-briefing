name: Tägliches Briefing

on:
  schedule:
    # 16:00 Uhr MESZ = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: # Manueller Trigger über GitHub UI

permissions:
  contents: write
  pages: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Briefing erstellen und versenden
        env:
          MAIL_ABSENDER: ${{ secrets.MAIL_ABSENDER }}
          MAIL_PASSWORT: ${{ secrets.MAIL_PASSWORT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PAGES_URL: https://gqwx6dwkyy-tech.github.io/zeitschriften-briefing
        run: python hauptprogramm.py

      - name: Zusammenfassungsseite deployen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/zusammenfassungen/
          git diff --staged --quiet || (git commit -m "Briefing $(date +%Y-%m-%d)" && git push)
